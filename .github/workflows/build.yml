name: Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build Android APK (Release)
        run: >
          dotnet publish "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj"
          -f net10.0-android
          -c Release
          -p:SingleTargetFramework=net10.0-android
          -p:AndroidPackageFormat=apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: lyricify-android-apk
          path: Lyricify.Lyrics.App/bin/Release/net10.0-android/**/*.apk
          if-no-files-found: warn

  # ── iOS Simulator ────────────────────────────────────────────────────────────
  build-ios:
    name: iOS (Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Xcode version
        run: |
          XCODE_ROOT=/Applications/Xcode_26.2.app
          echo "MD_APPLE_SDK_ROOT=$XCODE_ROOT" >> $GITHUB_ENV
          sudo xcode-select -s $XCODE_ROOT

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Build iOS (Simulator, no signing)
        run: >
          dotnet build "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj"
          -f net10.0-ios
          -c Release
          -p:SingleTargetFramework=net10.0-ios
          -p:RuntimeIdentifier=iossimulator-arm64
          -p:buildForSimulator=true
          -p:packageApp=false
          -p:ArchiveOnBuild=false

      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v7
        with:
          name: lyricify-ios-simulator
          path: Lyricify.Lyrics.App/bin/Release/net10.0-ios/iossimulator-arm64/**/*.app
          if-no-files-found: warn
