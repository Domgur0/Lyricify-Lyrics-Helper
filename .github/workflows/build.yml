name: Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore NuGet packages
        run: dotnet restore "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj" -f net8.0-android

      - name: Build Android APK (Release)
        run: >
          dotnet build "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj"
          -f net8.0-android
          -c Release
          -p:AndroidPackageFormat=apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyricify-android-apk
          path: Lyricify.Lyrics.App/bin/Release/net8.0-android/**/*.apk
          if-no-files-found: warn

  # ── iOS Simulator ────────────────────────────────────────────────────────────
  build-ios:
    name: iOS (Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Restore NuGet packages
        run: dotnet restore "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj" -f net8.0-ios

      - name: Build iOS (Simulator, no signing)
        run: >
          dotnet build "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj"
          -f net8.0-ios
          -c Release
          -p:RuntimeIdentifier=iossimulator-x64
          -p:CodesignKey=""
          -p:CodesignProvision=""

      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyricify-ios-simulator
          path: Lyricify.Lyrics.App/bin/Release/net8.0-ios/**/*.app
          if-no-files-found: warn
