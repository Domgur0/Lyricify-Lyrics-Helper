name: Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build Android APK (Release)
        run: >
          dotnet publish "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj"
          -f net10.0-android
          -c Release
          -p:SingleTargetFramework=net10.0-android
          -p:AndroidPackageFormats=apk

      - name: List Android build output
        if: always()
        run: |
          echo "=== Looking for APK/AAB files ==="
          find Lyricify.Lyrics.App/bin -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB files found"
          echo "=== Release output directory ==="
          ls -laR Lyricify.Lyrics.App/bin/Release/net10.0-android/ 2>/dev/null | head -60 || echo "Directory not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: lyricify-android-apk
          path: Lyricify.Lyrics.App/bin/Release/net10.0-android/**/*.apk
          if-no-files-found: error

  # ── iOS Simulator ────────────────────────────────────────────────────────────
  build-ios:
    name: iOS (Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Xcode version
        run: |
          XCODE_ROOT=""
          # Prefer the highest-versioned installed Xcode that can resolve both macOS SDK and actool.
          while IFS= read -r CANDIDATE; do
            [ -z "$CANDIDATE" ] && continue
            DEVELOPER_DIR="$CANDIDATE/Contents/Developer"
            if [ -d "$DEVELOPER_DIR/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" ] \
              && DEVELOPER_DIR="$DEVELOPER_DIR" xcrun --sdk macosx --find actool >/dev/null 2>&1; then
              XCODE_ROOT="$CANDIDATE"
              break
            fi
          done < <(
            ls -d /Applications/Xcode_*.app 2>/dev/null \
              | sort -V -r
          )
          if [ -z "$XCODE_ROOT" ]; then
            CANDIDATE=$(xcode-select -p 2>/dev/null | sed 's|/Contents/Developer||')
            DEVELOPER_DIR="$CANDIDATE/Contents/Developer"
            if [ -d "$DEVELOPER_DIR/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" ] \
              && DEVELOPER_DIR="$DEVELOPER_DIR" xcrun --sdk macosx --find actool >/dev/null 2>&1; then
              XCODE_ROOT="$CANDIDATE"
            fi
          fi
          if [ -z "$XCODE_ROOT" ] || [ ! -d "$XCODE_ROOT" ]; then
            echo "::error::No Xcode installation found"
            exit 1
          fi
          echo "Using Xcode at $XCODE_ROOT"
          echo "MD_APPLE_SDK_ROOT=$XCODE_ROOT" >> $GITHUB_ENV
          sudo xcode-select -s "$XCODE_ROOT"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Build iOS (Simulator, no signing)
        run: >
          dotnet build "Lyricify.Lyrics.App/Lyricify.Lyrics.App.csproj"
          -f net10.0-ios
          -c Release
          -p:SingleTargetFramework=net10.0-ios
          -p:RuntimeIdentifier=iossimulator-arm64
          -p:buildForSimulator=true
          -p:ArchiveOnBuild=false

      - name: List iOS build output
        if: always()
        run: |
          echo "=== Looking for .app bundles ==="
          find Lyricify.Lyrics.App/bin -name "*.app" -type d 2>/dev/null || echo "No .app bundles found"
          echo "=== Release output directory ==="
          ls -laR Lyricify.Lyrics.App/bin/Release/net10.0-ios/iossimulator-arm64/ 2>/dev/null | head -60 || echo "Directory not found"

      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v7
        with:
          name: lyricify-ios-simulator
          path: Lyricify.Lyrics.App/bin/Release/net10.0-ios/iossimulator-arm64/**/*.app
          if-no-files-found: error
